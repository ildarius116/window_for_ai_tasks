  - model_name: mws/qwen-image-lightning
    litellm_params:
      model: openai/qwen-image-lightning
      api_key: os.environ/MWS_GPT_API_KEY
      api_base: https://api.gpt.mws.ru/v1

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120
  fallbacks:
    - mws/gpt-alpha: ["mws/qwen3-235b", "mws/llama-3.3-70b"]
    - mws/qwen3-coder: ["mws/qwen3-235b", "mws/gpt-oss-120b"]
    - mws/qwen3-235b: ["mws/gpt-alpha", "mws/llama-3.3-70b"]
    - mws/gpt-oss-120b: ["mws/qwen3-235b", "mws/llama-3.3-70b"]

litellm_settings:
  drop_params: true
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
  max_internal_user_budget: 10
  internal_user_budget_duration: "1mo"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL
