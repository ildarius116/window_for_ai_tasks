# Production overrides for MWS GPT Platform
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"

  redis:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  litellm:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  openwebui:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"

  memory-service:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  tts-service:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  langfuse:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  prometheus:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  grafana:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  nginx:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
