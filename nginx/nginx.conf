events {
    worker_connections 1024;
}

http {
    # --- Rate Limiting Zones ---
    # General requests: 10 req/s per IP (burst allows short spikes)
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    # API endpoints: stricter 5 req/s per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
    # Concurrent connection limit per IP
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Return 429 Too Many Requests (instead of default 503)
    limit_req_status 429;
    limit_conn_status 429;

    upstream openwebui {
        server openwebui:8080;
    }

    upstream litellm {
        server litellm:4000;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 100M;

        # --- Security Headers ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss:; media-src 'self' blob:; object-src 'none'; frame-ancestors 'self';" always;

        # --- Concurrent connection limit ---
        limit_conn conn_per_ip 50;

        # --- Block common attack paths ---
        location ~ /\.(env|git|svn|htaccess|htpasswd|DS_Store) {
            deny all;
            return 404;
        }
        location ~ ^/(wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|phpmyadmin|myadmin|pma|admin/config|cgi-bin) {
            deny all;
            return 404;
        }

        # --- API endpoints (stricter rate limit) ---
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://openwebui;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # --- LiteLLM proxy (stricter rate limit) ---
        location /litellm/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://litellm/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Static assets (no rate limit — served from cache, no backend load) ---
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
            proxy_pass http://openwebui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- General requests ---
        location / {
            limit_req zone=general burst=40 nodelay;

            proxy_pass http://openwebui;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }

