services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "127.0.0.1:5432:5432"  # localhost only — accessible via SSH tunnel
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mws}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mws_dev_postgres_pw_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-openwebui}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mws} -d ${POSTGRES_DB:-openwebui}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - mws-network

  redis:
    image: redis:7-alpine
    # Port not exposed to host — accessible only via mws-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - mws-network

  litellm:
    build:
      context: ./litellm
      dockerfile: Dockerfile
    # Port not exposed to host — accessible only via mws-network
    environment:
      MWS_GPT_API_KEY: ${MWS_GPT_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-mws-dev-litellm-master-key-change-in-prod}
      LITELLM_DATABASE_URL: postgresql://${POSTGRES_USER:-mws}:${POSTGRES_PASSWORD:-mws_dev_postgres_pw_change_in_prod}@postgres:5432/litellm
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-mws-dev-public-key-change-in-prod}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-mws-dev-secret-key-change-in-prod}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - mws-network

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    # Port exposed for direct access (bypass nginx); remove in production
    ports: ["3000:8080"]
    environment:
      OPENAI_API_BASE_URLS: http://litellm:4000/v1
      OPENAI_API_KEYS: ${LITELLM_MASTER_KEY:-sk-mws-dev-litellm-master-key-change-in-prod}
      # Exposed so Pipe/Filter functions (e.g. auto_router_function.py) can read
      # the master key via os.getenv("LITELLM_MASTER_KEY") — without this,
      # Pipe calls back to LiteLLM return 401 Unauthorized.
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-mws-dev-litellm-master-key-change-in-prod}
      # Needed for phase-11 pptx delivery: pipe uploads generated .pptx via
      # POST /api/v1/files/ using this token. Without it the presentation
      # subagent falls back to a markdown plan.
      OWUI_ADMIN_TOKEN: ${OWUI_ADMIN_TOKEN:-}
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY:-mws-dev-openwebui-secret-key-change-in-prod}
      WEBUI_NAME: "MWS GPT"
      DATABASE_URL: postgresql://${POSTGRES_USER:-mws}:${POSTGRES_PASSWORD:-mws_dev_postgres_pw_change_in_prod}@postgres:5432/${POSTGRES_DB:-openwebui}
      ENABLE_SIGNUP: "true"
      ENABLE_LOGIN_FORM: "true"
      # Required for the bootstrap-provisioned admin api_key (sk-…) to work
      # against /api/v1/files/ (used by _sa_presentation for pptx upload).
      # Without this, API-key bearer auth is rejected and pptx falls back to
      # a markdown plan even though the file was successfully rendered.
      # NOTE: env var name is ENABLE_API_KEYS (plural) in OpenWebUI; it's a
      # PersistentConfig, so bootstrap also UPSERTs auth.enable_api_keys=true
      # into the config table on every boot.
      ENABLE_API_KEYS: "true"
      ENABLE_API_KEY_ENDPOINT_RESTRICTIONS: "false"
      WEBUI_AUTH: "true"
      DEFAULT_MODELS: "mws/gpt-alpha"
      ENABLE_OLLAMA_API: "false"
      RAG_EMBEDDING_ENGINE: "openai"
      RAG_EMBEDDING_MODEL: "mws/bge-m3"
      RAG_OPENAI_API_BASE_URL: "http://litellm:4000/v1"
      RAG_OPENAI_API_KEY: ${LITELLM_MASTER_KEY:-sk-mws-dev-litellm-master-key-change-in-prod}
      CHUNK_SIZE: "1500"
      CHUNK_OVERLAP: "100"
      RAG_TOP_K: "5"
      ENABLE_RAG_WEB_SEARCH: "true"
      RAG_WEB_SEARCH_ENGINE: "duckduckgo"
      RAG_WEB_SEARCH_RESULT_COUNT: "3"
      AUDIO_STT_ENGINE: "openai"
      AUDIO_STT_OPENAI_API_BASE_URL: "http://litellm:4000/v1"
      AUDIO_STT_OPENAI_API_KEY: ${LITELLM_MASTER_KEY:-sk-mws-dev-litellm-master-key-change-in-prod}
      AUDIO_STT_MODEL: "mws/whisper-turbo"
      AUDIO_TTS_ENGINE: "openai"
      AUDIO_TTS_OPENAI_API_BASE_URL: "http://tts-service:8000/v1"
      AUDIO_TTS_OPENAI_API_KEY: "sk-placeholder"
      AUDIO_TTS_MODEL: "tts-1"
      AUDIO_TTS_VOICE: "alloy"
    volumes:
      - openwebui_data:/app/backend/data
      - ./openwebui/static/custom.css:/app/backend/open_webui/static/custom.css:ro
      - ./openwebui/static/custom.css:/app/build/static/custom.css:ro
      - ./data/secrets:/owui_secrets:ro
    depends_on:
      litellm:
        condition: service_healthy
      tts-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - mws-network

  memory-service:
    build: ./memory-service
    # Port not exposed to host — accessible only via mws-network
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mws}:${POSTGRES_PASSWORD:-mws_dev_postgres_pw_change_in_prod}@postgres:5432/memory
      LITELLM_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY:-sk-mws-dev-litellm-master-key-change-in-prod}
      EMBEDDING_MODEL: mws/bge-m3
      EMBEDDING_DIMENSIONS: "1024"
      EXTRACTION_MODEL: mws/gpt-alpha
      SUMMARY_MODEL: mws/gpt-alpha
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - mws-network

  tts-service:
    build: ./tts-service
    # Port not exposed to host — accessible only via mws-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - mws-network

  pptx-service:
    build: ./pptx-service
    # Port not exposed to host — accessible only via mws-network
    environment:
      LITELLM_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY:-sk-mws-dev-litellm-master-key-change-in-prod}
      SCHEMA_MODEL: mws/glm-4.6
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - mws-network

  langfuse:
    image: langfuse/langfuse:2
    # Port not exposed to host — accessible only via mws-network
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mws}:${POSTGRES_PASSWORD:-mws_dev_postgres_pw_change_in_prod}@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-mws-dev-langfuse-nextauth-secret-change-in-prod}
      SALT: ${LANGFUSE_SALT:-mws-dev-langfuse-salt-change-in-prod}
      HOSTNAME: "0.0.0.0"
      TELEMETRY_ENABLED: "false"
      # Headless provisioning: on a fresh langfuse DB these vars make langfuse
      # create org + project + admin user + API keys automatically. On
      # subsequent boots with existing data they are ignored. The same public/
      # secret values are consumed by litellm below, so tracing works on a
      # bare `docker compose up -d` with zero manual steps.
      LANGFUSE_INIT_ORG_ID: mws
      LANGFUSE_INIT_ORG_NAME: MWS
      LANGFUSE_INIT_PROJECT_ID: mws-gpt
      LANGFUSE_INIT_PROJECT_NAME: MWS GPT Platform
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-mws-dev-public-key-change-in-prod}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-mws-dev-secret-key-change-in-prod}
      LANGFUSE_INIT_USER_EMAIL: admin@mws.local
      LANGFUSE_INIT_USER_NAME: MWS Admin
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-mws-dev-admin-password-change-in-prod}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:3000/api/public/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - mws-network

  prometheus:
    image: prom/prometheus:latest
    # Port not exposed to host — accessible only via mws-network
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - mws-network

  grafana:
    image: grafana/grafana:latest
    ports: ["3002:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: http://localhost:3002
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - mws-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - openwebui
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    networks:
      - mws-network

  bootstrap:
    # One-shot init container. Waits for the first OpenWebUI user to sign up
    # (= admin by default flow) and then UPSERTs Pipe/Filter functions into
    # the openwebui DB so "MWS GPT Auto 🎯" and "MWS Memory" are registered
    # automatically. Idempotent — safe to re-run on every `docker compose up`.
    image: python:3.11-slim
    container_name: mws-bootstrap
    depends_on:
      postgres:
        condition: service_healthy
      openwebui:
        condition: service_started
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-mws}
      PGPASSWORD: ${POSTGRES_PASSWORD:-mws_dev_postgres_pw_change_in_prod}
      PGDATABASE: openwebui
      PIPELINES_DIR: /pipelines
      # Mirrored into host .env so the file is the single source of truth
      # for secrets. These come from compose defaults on first boot and from
      # the operator's .env on subsequent boots — either way bootstrap
      # writes them through.
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-mws-dev-public-key-change-in-prod}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-mws-dev-secret-key-change-in-prod}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-mws-dev-litellm-master-key-change-in-prod}
      OPENWEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY:-mws-dev-openwebui-secret-key-change-in-prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mws_dev_postgres_pw_change_in_prod}
      LANGFUSE_NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-mws-dev-langfuse-nextauth-secret-change-in-prod}
      LANGFUSE_SALT: ${LANGFUSE_SALT:-mws-dev-langfuse-salt-change-in-prod}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_CACHE_DIR: "1"
    volumes:
      - ./pipelines:/pipelines:ro
      - ./scripts/bootstrap.py:/bootstrap.py:ro
      - ./data/secrets:/secrets
      - ./.env:/host/.env
    command: >
      sh -c "pip install --quiet psycopg2-binary==2.9.9 && python -u /bootstrap.py"
    restart: on-failure
    networks:
      - mws-network

networks:
  mws-network:
    driver: bridge

volumes:
  redis_data:
  openwebui_data:
  prometheus_data:
  grafana_data:
